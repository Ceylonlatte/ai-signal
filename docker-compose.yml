services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aisignal
      POSTGRES_PASSWORD: aisignal
      POSTGRES_DB: aisignal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisignal"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    # `image` lets CI push this tag and the VPS `docker compose pull` fetch it
    # (local `docker compose build` also tags the built image with this name).
    image: ghcr.io/ceylonlatte/ai-signal:latest
    command: npm run start
    # .env supplies INGEST_TOKEN / AUTH_* (Google login) / OPENROUTER_API_KEY / models / weights.
    # `environment` overrides DATABASE_URL to the compose-internal host (`db`).
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://aisignal:aisignal@db:5432/aisignal
      # Render all server-side dates (status / dashboard / feed) in Beijing time;
      # timestamptz is stored as UTC, so this only affects toLocaleString output.
      TZ: Asia/Shanghai
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    image: ghcr.io/ceylonlatte/ai-signal:latest
    command: npm run worker
    # The worker scores + embeds, so it MUST get OPENROUTER_API_KEY from .env.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://aisignal:aisignal@db:5432/aisignal
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
