services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aisignal
      POSTGRES_PASSWORD: aisignal
      POSTGRES_DB: aisignal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aisignal"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
