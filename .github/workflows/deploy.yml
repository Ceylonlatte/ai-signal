name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Private repo -> the VPS needs no GitHub credentials: the runner (which has
      # the checkout) copies the source over SSH, and the VPS builds it.
      - name: Copy source to VPS
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/opt/ai-signal"
          overwrite: true

      - name: Build & restart on VPS
        if: ${{ secrets.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/ai-signal
            docker compose build
            docker compose up -d db
            until docker compose exec -T db pg_isready -U aisignal; do sleep 2; done
            docker compose exec -T db psql -U aisignal -d aisignal -c "CREATE EXTENSION IF NOT EXISTS vector;" || true
            docker compose run --rm web npm run db:migrate
            docker compose up -d
            docker image prune -f
