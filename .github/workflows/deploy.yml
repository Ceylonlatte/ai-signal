name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Bridge the secret into env: the `secrets` context is NOT allowed in step
    # `if:` conditions, but `env` is. This gates the VPS-deploy steps cleanly.
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build on the runner (ample RAM) and push to GHCR. The 1 GB VPS cannot
      # build Next.js itself (npm ci / next build OOM), so it only PULLS.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/ceylonlatte/ai-signal:latest
            ghcr.io/ceylonlatte/ai-signal:${{ github.sha }}

      # Keep the VPS's compose file in sync (app code lives in the image).
      - name: Copy compose to VPS
        if: ${{ env.VPS_HOST != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/ai-signal"
          overwrite: true

      - name: Deploy on VPS (pull image, migrate, restart)
        if: ${{ env.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/ai-signal
            docker compose pull web worker
            docker compose up -d db
            until docker compose exec -T db pg_isready -U aisignal; do sleep 2; done
            docker compose exec -T db psql -U aisignal -d aisignal -c "CREATE EXTENSION IF NOT EXISTS vector;"
            docker compose run --rm web npm run db:migrate
            docker compose up -d web worker
            docker image prune -f
