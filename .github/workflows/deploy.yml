name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Bridge the secret into env (secrets context is not allowed in `if:`).
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
    steps:
      - uses: actions/checkout@v5

      # Build the amd64 image on the runner (the 1 GB VPS can't build it).
      # We ship it to the VPS via docker save + load (no registry), so the
      # private image needs no GHCR pull credentials on the VPS.
      - name: Build image
        run: docker build --platform linux/amd64 -t ghcr.io/ceylonlatte/ai-signal:latest .

      - name: Save image to tarball
        run: docker save ghcr.io/ceylonlatte/ai-signal:latest | gzip > image.tar.gz

      - name: Copy image + compose to VPS
        if: ${{ env.VPS_HOST != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "image.tar.gz,docker-compose.yml"
          target: "/opt/ai-signal"
          overwrite: true

      - name: Load image + migrate + restart on VPS
        if: ${{ env.VPS_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /opt/ai-signal
            gunzip -f image.tar.gz
            docker load -i image.tar
            rm -f image.tar
            docker compose up -d db
            until docker compose exec -T db pg_isready -U aisignal; do sleep 2; done
            docker compose exec -T db psql -U aisignal -d aisignal -c "CREATE EXTENSION IF NOT EXISTS vector;"
            docker compose run --rm web npm run db:migrate
            docker compose up -d web worker
            docker image prune -f
